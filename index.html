<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>記憶の欠片</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="statusbar" aria-label="ステータス">
        <div>
          <span>Progress</span>
          <strong id="memoryCount">0 / 8</strong>
        </div>
        <div>
          <span>Room</span>
          <strong id="nearText">---</strong>
        </div>
        <button id="startButton" type="button">始める</button>
      </header>

      <canvas id="game" width="960" height="540" aria-label="記憶の欠片ゲーム画面"></canvas>

      <section class="controls" aria-label="操作">
        <button class="control" data-key="ArrowUp" type="button">↑</button>
        <div>
          <button class="control" data-key="ArrowLeft" type="button">←</button>
          <button class="control action" id="inspectButton" type="button">調べる</button>
          <button class="control" data-key="ArrowRight" type="button">→</button>
        </div>
        <button class="control" data-key="ArrowDown" type="button">↓</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
